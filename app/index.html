<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
const { createApp, ref, computed, onMounted, watch } = Vue;

// Gradient presets for dynamic daily background
const DAILY_GRADIENTS = [
  'linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff6b9d 100%)',
  'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #fbc2eb 100%)',
  'linear-gradient(135deg, #ffecd2 0%, #ff9a9e 50%, #fad0c4 100%)',
  'linear-gradient(135deg, #d4fc79 0%, #96e6a1 50%, #fbc2eb 100%)',
  'linear-gradient(135deg, #fccb90 0%, #d57eeb 50%, #fbc2eb 100%)',
  'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 50%, #fbc2eb 100%)',
  'linear-gradient(135deg, #ffd1ff 0%, #fad0c4 50%, #ffecd2 100%)',
  'linear-gradient(135deg, #ffeaa7 0%, #fdcbf1 50%, #a1c4fd 100%)',
];

const app = createApp({
  setup() {
    const currentPage = ref('home');
    const stats = ref({});
    const letters = ref([]);
    const currentLetter = ref({});
    const newLetterTitle = ref('');
    const newLetterContent = ref('');
    const newTimelineDate = ref(new Date().toISOString().split('T')[0]);
    const newTimelineTitle = ref('');
    const newTimelineContent = ref('');
    const newTimelinePhotos = ref([]);
    const timelinePhotoInput = ref(null);
    const editingTimelineId = ref(null);
    const wishes = ref([]);
    const myWishes = ref([]);
    const timeline = ref([]);
    const timelineComments = ref({});  // { timelineId: [comments] }
    const commentInputs = ref({});     // { timelineId: inputText }
    const replyTarget = ref(null);     // currently replying to which comment id
    const replyInputs = ref({});       // { commentId: replyText }
    const onThisDay = ref([]);
    const timelineStats = ref(null);
    const previewPhoto = ref(null);
    const dailyNote = ref({ love_note: '今天也是一个爱你的日子 💕' });
    const myDailyMsg = ref('');
    const todayMyMsg = ref('');
    const todayPartnerMsg = ref('');
    const moodStreak = ref(0);

    // Badge tracking — last seen counts, reset when viewing page
    const lastSeenTimeline = ref(0);
    const lastSeenFulfilled = ref(0);
    const dailyMsgSeen = ref(false);

    const mailboxBadge = computed(() => stats.value.unread_letters || 0);
    const wishesBadge = computed(() => {
      if (!myWishes.value.length) return 0;
      const fulfilled = myWishes.value.filter(w => w.is_fulfilled).length;
      if (fulfilled > lastSeenFulfilled.value) return fulfilled - lastSeenFulfilled.value;
      return 0;
    });
    const timelineBadge = computed(() => {
      if (!timeline.value.length) return 0;
      const n = timeline.value.length;
      if (n > lastSeenTimeline.value) return n - lastSeenTimeline.value;
      return 0;
    });
    const dailyBadge = computed(() => {
      if (dailyMsgSeen.value) return 0;
      return todayPartnerMsg.value ? 1 : 0;
    });
    const whispersBadge = computed(() => whisperUnread.value);

    function markPageSeen(page) {
      if (page === 'daily') dailyMsgSeen.value = true;
    }
    const newWish = ref('');
    const now = new Date(); const todayDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
    const audioPlayer = ref(null);
    const musicPlaying = ref(false);

    const starResult = ref(null);
    const unfulfilledWishes = computed(() => wishes.value.filter(w => !w.is_fulfilled));
    const wishesSorted = computed(() =>
      [...wishes.value].sort((a, b) => a.is_fulfilled - b.is_fulfilled)
    );

    // ── Whispers ──
    const whispers = ref([]);
    const newWhisper = ref('');
    const whisperSigned = ref(true);
    const revealWhisper = ref(null);
    const whisperUnread = computed(() => whispers.value.length);

    async function loadWhispers() {
      try {
        const r = await axios.get('/api/whispers/inbox');
        whispers.value = r.data;
      } catch (e) { /* endpoint not ready */ }
    }

    async function sendWhisper() {
      if (!newWhisper.value.trim()) return;
      await axios.post('/api/whispers', { content: newWhisper.value.trim() });
      newWhisper.value = '';
      vant.showToast('悄悄话已送出 🕊️');
    }

    function openWhisper(w) {
      revealWhisper.value = w;
    }

    async function dismissWhisper() {
      const w = revealWhisper.value;
      if (!w) return;
      try {
        await axios.delete('/api/whispers/' + w.id);
      } catch (e) { /* ok */ }
      whispers.value = whispers.value.filter(x => x.id !== w.id);
      revealWhisper.value = null;
    }

    // WebSocket for real-time whispers
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(proto + '://' + location.host);
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.event === 'whisper') {
            const w = msg.data;
            const myRole = currentUser.value ? currentUser.value.role : 'girl';
            if (w.author !== myRole) {
              whispers.value.unshift({ ...w, is_read: 0, created_at: '刚刚' });
            }
          }
          if (msg.event === 'thinking') {
            const t = msg.data;
            const myRole = currentUser.value ? currentUser.value.role : 'girl';
            if (t.author !== myRole) {
              showThinkingToast();
            }
          }
        } catch (ex) {}
      };
      ws.onclose = () => { setTimeout(connectWS, 3000); };
    }

    const dailyBgStyle = computed(() => {
      const days = stats.value.days_together || 1;
      const idx = days % DAILY_GRADIENTS.length;
      return { background: DAILY_GRADIENTS[idx] };
    });

    // Next milestone countdown
    const MILESTONES = [100, 200, 300, 365, 400, 500, 600, 700, 730, 800, 900, 1000, 1095, 1460];
    const MILESTONE_LABELS = {
      100: '在一起 100 天 💯', 200: '在一起 200 天', 300: '在一起 300 天',
      365: '一周年 🎂', 400: '在一起 400 天', 500: '在一起 500 天', 600: '在一起 600 天',
      700: '在一起 700 天', 730: '两周年 💕', 800: '在一起 800 天', 900: '在一起 900 天',
      1000: '在一起 1000 天 ✨', 1095: '三周年 🌹', 1460: '四周年 💎'
    };
    const nextMilestone = computed(() => {
      const days = stats.value.days_together || 0;
      const next = MILESTONES.find(m => m > days);
      if (!next) return null;
      const prev = MILESTONES[MILESTONES.indexOf(next) - 1] || 0;
      const remaining = next - days;
      const progress = ((days - prev) / (next - prev)) * 100;
      return { label: MILESTONE_LABELS[next] || (next + ' 天'), remaining, progress: Math.round(progress) };
    });

    // ── Auth System ──
    const loggedIn = ref(false);
    const currentUser = ref(null);
    const loginRole = ref('girl');
    const loginPassword = ref('');
    const loginError = ref('');

    // Axios interceptor — attach auth token
    axios.interceptors.request.use(config => {
      const token = localStorage.getItem('niannian_token');
      if (token) config.headers.Authorization = 'Bearer ' + token;
      return config;
    });
    axios.interceptors.response.use(
      r => r,
      err => {
        if (err.response && err.response.status === 401) {
          localStorage.removeItem('niannian_token');
          loggedIn.value = false;
          currentUser.value = null;
        }
        return Promise.reject(err);
      }
    );

    async function login() {
      loginError.value = '';
      try {
        const username = loginRole.value === 'boy' ? 'boy' : 'girl';
        const r = await axios.post('/api/auth/login', {
          username,
          password: loginPassword.value
        });
        localStorage.setItem('niannian_token', r.data.token);
        currentUser.value = r.data.user;
        loggedIn.value = true;
        loginPassword.value = '';
        loadAll();
        connectWS();
      } catch (e) {
        loginError.value = (e.response && e.response.data && e.response.data.error) || '登录失败';
      }
    }

    async function logout() {
      try { await axios.post('/api/auth/logout'); } catch (e) {}
      localStorage.removeItem('niannian_token');
      loggedIn.value = false;
      currentUser.value = null;
      stopCountdown();
    }

    async function restoreSession() {
      const token = localStorage.getItem('niannian_token');
      if (!token) return;
      try {
        const r = await axios.get('/api/auth/me');
        currentUser.value = r.data.user;
        loggedIn.value = true;
        loadAll();
        connectWS();
      } catch (e) {
        localStorage.removeItem('niannian_token');
      }
    }

    // ── Countdown Timer ──
    const cd = ref({ years: 0, months: 0, days: 0, hours: 0, minutes: 0, seconds: 0 });
    let cdTimer = null;

    function updateCountdown() {
      const anniv = stats.value.anniversary_date;
      if (!anniv) return;
      const start = new Date(anniv + 'T00:00:00');
      if (isNaN(start.getTime())) return;
      const now = new Date();
      let totalSeconds = Math.floor((now - start) / 1000);
      if (totalSeconds < 0) totalSeconds = 0;

      const totalDays = Math.floor(totalSeconds / 86400);
      totalSeconds = totalSeconds % 86400;

      let years = Math.floor(totalDays / 365.25);
      let remainingDays = totalDays - Math.floor(years * 365.25);
      let months = Math.floor(remainingDays / 30.4375);
      remainingDays = Math.floor(remainingDays - months * 30.4375);
      if (months >= 12) { years++; months -= 12; }

      cd.value = {
        years, months,
        days: Math.max(0, remainingDays),
        hours: Math.floor(totalSeconds / 3600),
        minutes: Math.floor((totalSeconds % 3600) / 60),
        seconds: Math.floor(totalSeconds % 60),
      };
    }

    function startCountdown() {
      updateCountdown();
      cdTimer = setInterval(updateCountdown, 1000);
    }

    function stopCountdown() {
      if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
    }

    // ── Mood Check-in ──
    const todayMoods = ref({ boy_mood: null, girl_mood: null });
    const moodPickerVisible = ref(false);
    const moodPickerAuthor = ref('boy');
    const pendingMood = ref(null);
    const moodOptions = ['😊', '🥰', '😘', '😄', '🤗', '😌', '😴', '😢', '😤', '😎', '🥳', '🤪', '😋', '🤩', '😇'];

    async function loadTodayMoods() {
      try {
        const r = await axios.get('/api/moods/today');
        todayMoods.value = r.data;
      } catch (e) { /* endpoint not ready yet */ }
    }

    function openMoodPicker(author) {
      moodPickerAuthor.value = author;
      pendingMood.value = null;
      moodPickerVisible.value = true;
    }

    async function selectMood(mood) {
      pendingMood.value = mood;
      const role = currentUser.value.role;
      try {
        await axios.post('/api/moods', { mood });
        if (role === 'boy') todayMoods.value.boy_mood = mood;
        else todayMoods.value.girl_mood = mood;
        moodPickerVisible.value = false;
      } catch (e) { /* silently fail */ }
    }

    // ── Date Spinner ──
    const spinnerVisible = ref(false);
    const spinnerRotation = ref(0);
    const spinnerSpinning = ref(false);
    const spinnerResult = ref('');
    const spinnerHasSpun = ref(false);

    const dateIdeas = [
      '隔空猜拳 🍻', '同步涂鸦 🎨', '表情截图互猜 😜', '线上桌游夜 ♟️',
      '云逛街互挑衣服 🛍️', '同一主题自拍 📸', '语音纸条告白 🎙️', '睡前故事接龙 🌙',
      '云吃同款宵夜 🍜', '合唱一首歌 🎤', '猜对方在干嘛 🤔', '24小时连麦挑战 📞',
    ];

    const spinnerColors = [
      '#ff6b9d', '#ff8e72', '#ffb347', '#87ceeb',
      '#a8e6cf', '#ffd3b6', '#d4a5d4', '#89cff0',
      '#ff9a9e', '#fbc2eb', '#a1c4fd', '#c2e9fb',
    ];

    const segmentAngle = computed(() => 360 / dateIdeas.length);

    function openDateSpinner() {
      spinnerVisible.value = true;
      spinnerResult.value = '';
      spinnerHasSpun.value = false;
      spinnerSpinning.value = false;
    }

    function spinWheel() {
      if (spinnerSpinning.value) return;
      spinnerSpinning.value = true;
      spinnerResult.value = '';
      const targetIdx = Math.floor(Math.random() * dateIdeas.length);
      const spins = 5 + Math.floor(Math.random() * 5);
      const targetAngle = spins * 360 + targetIdx * segmentAngle.value;
      spinnerRotation.value += targetAngle;
      setTimeout(() => {
        spinnerSpinning.value = false;
        spinnerHasSpun.value = true;
        spinnerResult.value = '🎉 ' + dateIdeas[targetIdx];
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      }, 4200);
    }

    // ── Audio ──
    const isPlayableAudio = computed(() => {
      const url = dailyNote.value.song_url;
      if (!url) return false;
      return /\.(mp3|wav|ogg|m4a|aac|flac)(\?.*)?$/i.test(url) || url.startsWith('/uploads/');
    });

    function toggleMusic() {
      const a = audioPlayer.value;
      if (!a || !isPlayableAudio.value) return;
      if (a.paused) {
        a.play().then(() => { musicPlaying.value = true; }).catch(() => {});
      } else {
        a.pause();
        musicPlaying.value = false;
      }
    }

    function autoPlayMusic() {
      const a = audioPlayer.value;
      if (!a || !isPlayableAudio.value) return;
      if (a.paused) {
        a.play().then(() => { musicPlaying.value = true; }).catch(() => {});
      }
    }

    function stopMusic() {
      const a = audioPlayer.value;
      if (a) { a.pause(); }
      musicPlaying.value = false;
    }

    // ── Data loading ──
    async function loadStats() {
      const r = await axios.get('/api/stats'); stats.value = r.data;
    }
    async function loadLetters() {
      const r = await axios.get('/api/letters/inbox'); letters.value = r.data;
    }
    async function loadWishes() {
      const r = await axios.get('/api/wishes'); wishes.value = r.data;
    }
    async function loadMyWishes() {
      const r = await axios.get('/api/wishes/mine'); myWishes.value = r.data;
      lastSeenFulfilled.value = myWishes.value.filter(w => w.is_fulfilled).length;
    }
    async function fulfillWish(id) {
      await axios.put('/api/wishes/' + id + '/fulfill');
      loadWishes(); loadMyWishes(); loadStats();
      vant.showToast('愿望已实现 ✨');
    }
    async function loadTimeline() {
      const [r1, r2, r3] = await Promise.all([
        axios.get('/api/timeline'),
        axios.get('/api/timeline/on-this-day'),
        axios.get('/api/timeline/stats')
      ]);
      timeline.value = r1.data;
      onThisDay.value = r2.data;
      timelineStats.value = r3.data;
      lastSeenTimeline.value = timeline.value.length;
    }
    async function loadDaily() {
      const r = await axios.get('/api/daily/today'); dailyNote.value = r.data;
    }
    async function loadDailyMessages() {
      try {
        const r = await axios.get('/api/daily/messages/today');
        const role = currentUser.value.role;
        if (role === 'boy') {
          todayMyMsg.value = r.data.boy_msg || '';
          todayPartnerMsg.value = r.data.girl_msg || '';
        } else {
          todayMyMsg.value = r.data.girl_msg || '';
          todayPartnerMsg.value = r.data.boy_msg || '';
        }
      } catch (e) { /* ok */ }
    }
    async function sendDailyMsg() {
      if (!myDailyMsg.value.trim()) return;
      await axios.post('/api/daily/messages', { content: myDailyMsg.value.trim() });
      todayMyMsg.value = myDailyMsg.value.trim();
      myDailyMsg.value = '';
    }
    async function loadMoodStreak() {
      try {
        const r = await axios.get('/api/moods/streak');
        moodStreak.value = r.data.streak;
      } catch (e) { /* ok */ }
    }
    async function sendThinking() {
      await axios.post('/api/daily/thinking');
      vant.showToast('已发送 💕');
    }
    const thinkingVisible = ref(false);
    const thinkingHearts = ref([]);
    function showThinkingToast() {
      thinkingVisible.value = true;
      // Spawn floating hearts
      const hearts = ['💕', '💗', '💖', '💝', '🩷', '❤️', '💓'];
      const newHearts = [];
      for (let i = 0; i < 12; i++) {
        newHearts.push({
          emoji: hearts[Math.floor(Math.random() * hearts.length)],
          left: Math.random() * 90 + 5 + '%',
          delay: Math.random() * 0.8 + 's',
          duration: 2 + Math.random() * 2 + 's',
          size: 20 + Math.random() * 20 + 'px',
        });
      }
      thinkingHearts.value = newHearts;
      setTimeout(() => {
        thinkingVisible.value = false;
        thinkingHearts.value = [];
      }, 3000);
    }
    async function loadAll() {
      await Promise.all([loadStats(), loadLetters(), loadWishes(), loadMyWishes(), loadTimeline(), loadDaily(), loadTodayMoods(), loadWhispers(), loadDailyMessages(), loadMoodStreak()]);
      // Set initial baseline for badges
      lastSeenFulfilled.value = myWishes.value.filter(w => w.is_fulfilled).length;
      lastSeenTimeline.value = timeline.value.length;
      dailyMsgSeen.value = !!todayPartnerMsg.value;
      if (currentPage.value === 'daily') { startCountdown(); autoPlayMusic(); }
    }

    async function openLetter(letter) {
      currentLetter.value = letter;
      currentPage.value = 'letter-detail';
      if (!letter.is_read) {
        await axios.put('/api/letters/' + letter.id + '/read');
        loadStats(); loadLetters();
      }
    }
    async function reactToLetter(emoji) {
      await axios.put('/api/letters/' + currentLetter.value.id + '/react', { emoji });
      currentLetter.value.reaction = emoji;
      loadLetters();
    }
    async function sendLetter() {
      if (!newLetterTitle.value.trim() || !newLetterContent.value.trim()) return;
      await axios.post('/api/letters', { title: newLetterTitle.value.trim(), content: newLetterContent.value.trim() });
      newLetterTitle.value = '';
      newLetterContent.value = '';
      currentPage.value = 'mailbox';
      loadLetters(); loadStats();
      vant.showToast('信已寄出 💌');
    }
    async function uploadTimelinePhoto(e) {
      const files = e.target.files;
      if (!files.length) return;
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        const r = await axios.post('/api/upload', formData, { headers: { 'Content-Type': 'multipart/form-data' } });
        newTimelinePhotos.value.push(r.data.url);
      }
      e.target.value = '';
    }
    async function toggleMilestone(id) {
      await axios.patch('/api/timeline/' + id + '/milestone');
      loadTimeline();
    }
    function editTimeline(t) {
      editingTimelineId.value = t.id;
      newTimelineDate.value = t.date;
      newTimelineTitle.value = t.title;
      newTimelineContent.value = t.content;
      newTimelinePhotos.value = [...(t.photos || [])];
      currentPage.value = 'timeline-compose';
    }
    async function addTimeline() {
      if (!newTimelineTitle.value.trim() && !newTimelineContent.value.trim() && !newTimelinePhotos.value.length) return;
      const payload = {
        date: newTimelineDate.value,
        title: newTimelineTitle.value.trim(),
        content: newTimelineContent.value.trim(),
        photos: [...newTimelinePhotos.value],
        is_milestone: false
      };
      if (editingTimelineId.value) {
        await axios.patch('/api/timeline/' + editingTimelineId.value, payload);
        editingTimelineId.value = null;
        vant.showToast('回忆已更新 📸');
      } else {
        await axios.post('/api/timeline', payload);
        vant.showToast('回忆已保存 📸');
      }
      newTimelineTitle.value = '';
      newTimelineContent.value = '';
      newTimelinePhotos.value = [];
      newTimelineDate.value = new Date().toISOString().split('T')[0];
      currentPage.value = 'timeline';
      loadTimeline(); loadStats();
    }
    async function deleteTimeline(id) {
      try {
        await vant.showConfirmDialog({
          title: '确定删除',
          message: '删除后无法恢复，确定要删除这条回忆吗？'
        });
      } catch (e) {
        return; // user cancelled
      }
      await axios.delete('/api/timeline/' + id);
      loadTimeline(); loadStats();
      vant.showToast('回忆已删除');
    }

    // ── Timeline Comments ──
    function getTopComments(timelineId) {
      return (timelineComments.value[timelineId] || []).filter(c => !c.parent_id);
    }
    function getReplies(timelineId, parentId) {
      return (timelineComments.value[timelineId] || []).filter(c => c.parent_id === parentId);
    }
    function getCommentAuthor(timelineId, commentId) {
      const comments = timelineComments.value[timelineId] || [];
      const c = comments.find(x => x.id === commentId);
      if (!c) return '';
      return c.author === 'boy' ? (stats.value.boy_name || '狐狸先生') : (stats.value.girl_name || '猫咪小姐');
    }
    function getCommentContent(timelineId, commentId) {
      const comments = timelineComments.value[timelineId] || [];
      const c = comments.find(x => x.id === commentId);
      return c ? c.content : '';
    }

    async function loadAllComments() {
      try {
        const r = await axios.get('/api/timeline/comments/all');
        // Group comments by timeline_id
        const grouped = {};
        for (const c of r.data) {
          if (!grouped[c.timeline_id]) grouped[c.timeline_id] = [];
          grouped[c.timeline_id].push(c);
        }
        timelineComments.value = grouped;
      } catch (e) { /* ok */ }
    }

    async function loadComments(timelineId) {
      try {
        const r = await axios.get('/api/timeline/' + timelineId + '/comments');
        timelineComments.value = { ...timelineComments.value, [timelineId]: r.data };
      } catch (e) { /* ok */ }
    }

    async function sendComment(timelineId) {
      const input = commentInputs.value[timelineId];
      if (!input || !input.trim()) return;
      await axios.post('/api/timeline/' + timelineId + '/comments', { content: input.trim() });
      commentInputs.value = { ...commentInputs.value, [timelineId]: '' };
      replyTarget.value = null;
      await loadComments(timelineId);
    }

    function replyTo(timelineId, commentId) {
      replyTarget.value = replyTarget.value === commentId ? null : commentId;
      commentInputs.value = { ...commentInputs.value, [timelineId]: '' };
    }

    async function sendReply(timelineId, parentId) {
      const input = replyInputs.value[parentId];
      if (!input || !input.trim()) return;
      await axios.post('/api/timeline/' + timelineId + '/comments', { content: input.trim(), parent_id: parentId });
      replyInputs.value = { ...replyInputs.value, [parentId]: '' };
      replyTarget.value = null;
      await loadComments(timelineId);
    }

    async function deleteComment(timelineId, commentId) {
      await axios.delete('/api/timeline/' + timelineId + '/comments/' + commentId);
      await loadComments(timelineId);
    }

    async function addWish() {
      if (!newWish.value.trim()) return;
      await axios.post('/api/wishes', { content: newWish.value.trim() });
      newWish.value = '';
      loadWishes(); loadMyWishes(); loadStats();
      vant.showToast('愿望已许下 ✨');
    }

    function pickStar() {
      if (unfulfilledWishes.value.length === 0) return;
      const idx = Math.floor(Math.random() * unfulfilledWishes.value.length);
      starResult.value = unfulfilledWishes.value[idx];
    }

    // ── Identity theme watcher ──
    watch(currentUser, (user) => {
      if (user) {
        document.body.className = 'identity-' + user.role;
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = user.role === 'boy' ? '#f5f4fa' : '#fff5f7';
      }
    });

    // ── Lifecycle ──
    onMounted(() => { restoreSession(); });

    watch(currentPage, (page) => {
      markPageSeen(page);
      if (page === 'daily') {
        startCountdown();
        loadTodayMoods();
        loadDailyMessages();
        setTimeout(autoPlayMusic, 400);
      } else {
        stopCountdown();
      }
      if (page === 'whispers') loadWhispers();
      if (page === 'wishes') { loadWishes(); loadMyWishes(); }
      if (page === 'timeline') { loadTimeline(); loadAllComments(); }
      if (page === 'mailbox') loadLetters();
    });

    return {
      currentPage, stats, letters, currentLetter, wishes, myWishes, wishesSorted, starResult, unfulfilledWishes, pickStar, fulfillWish,
      timeline, onThisDay, timelineStats, previewPhoto, dailyNote, newWish, todayDate,
      audioPlayer, musicPlaying, isPlayableAudio,
      dailyBgStyle,
      // Auth
      loggedIn, currentUser, loginRole, loginPassword, loginError, login, logout,
      // Countdown
      cd,
      // Mood
      todayMoods, moodPickerVisible, moodPickerAuthor, moodOptions, pendingMood,
      openMoodPicker, selectMood,
      myDailyMsg, todayMyMsg, todayPartnerMsg, sendDailyMsg,
      moodStreak, nextMilestone,
      sendThinking, thinkingVisible, thinkingHearts,
      mailboxBadge, wishesBadge, timelineBadge, dailyBadge, whispersBadge,
      // Spinner
      spinnerVisible, spinnerRotation, spinnerSpinning, spinnerResult, spinnerHasSpun,
      dateIdeas, spinnerColors, segmentAngle,
      openDateSpinner, spinWheel,
      // Actions
      toggleMusic, stopMusic, openLetter, reactToLetter, sendLetter, newLetterTitle, newLetterContent, addWish,
      addTimeline, editTimeline, deleteTimeline, toggleMilestone, editingTimelineId, newTimelineDate, newTimelineTitle, newTimelineContent, newTimelinePhotos, timelinePhotoInput, uploadTimelinePhoto,
      // Comments
      timelineComments, commentInputs, replyTarget, replyInputs,
      getTopComments, getReplies, getCommentAuthor, getCommentContent, replyTo, sendReply, sendComment, deleteComment, loadComments,
      // Whispers
      whispers, newWhisper, whisperSigned, revealWhisper, whisperUnread,
      sendWhisper, openWhisper, dismissWhisper,
    };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
